<style>
  :root {
    --bg: #fdf6e8;
    --bg-warm: #f7ecd4;
    --card: #ffffff;
    --ink: #2c2117;
    --ink-soft: #6b5c4e;
    --ink-faint: #a89a89;
    --line: #ecdfc6;
    --coral: #e07856;
    --coral-dark: #c25e3e;
    --sage: #6b8e5f;
    --sage-dark: #557548;
    --rose: #c17070;
    --rose-dark: #a55656;
    --sun: #f4c753;
    --shadow: 0 6px 24px rgba(78, 52, 22, 0.10), 0 2px 6px rgba(78, 52, 22, 0.06);

  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Nunito", system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }

  body {
    background-image:
      radial-gradient(circle at 10% 0%, rgba(244, 199, 83, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 90% 20%, rgba(224, 120, 86, 0.10) 0%, transparent 50%),
      radial-gradient(circle at 50% 100%, rgba(107, 142, 95, 0.08) 0%, transparent 50%);
    background-attachment: fixed;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 4rem;
  }

  /* ---------- HEADER ---------- */
  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .sun-icon {
    font-size: 2.2rem;
    display: inline-block;
    animation: spin 18s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  h1 {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-size: clamp(2.4rem, 7vw, 3.8rem);
    letter-spacing: -0.02em;
    line-height: 1;
    margin: 0.5rem 0 0.75rem;
    color: var(--ink);
  }

  h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--coral);
  }

  .tagline {
    font-size: 1.05rem;
    color: var(--ink-soft);
    max-width: 420px;
    margin: 0 auto;
  }

  .meta-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    margin-top: 1.5rem;
    font-size: 0.9rem;
    color: var(--ink-soft);
    flex-wrap: wrap;
  }

  .progress-pill {
    background: var(--bg-warm);
    padding: 0.4rem 0.9rem;
    border-radius: 999px;
    font-weight: 600;
    color: var(--ink);
    border: 1px solid var(--line);
  }

  .reset-btn {
    background: transparent;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    text-decoration: underline;
    transition: color 0.2s;
  }

  .reset-btn:hover { color: var(--rose-dark); }

  /* ---------- CARD ---------- */
  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 2rem;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.4s ease-out;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--sun) 0%, var(--coral) 50%, var(--sage) 100%);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .recipe-name {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-size: clamp(1.6rem, 4.5vw, 2.2rem);
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 0.75rem;
  }

  .badges {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.75rem;
  }

  .badge {
    background: var(--bg-warm);
    color: var(--ink);
    padding: 0.3rem 0.8rem;
    border-radius: 999px;
    font-size: 0.82rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }

  .badge.cal { background: #fdf0d8; color: #8a6520; }
  .badge.ing { background: #e7f0e2; color: #3f5d33; }

  .section {
    margin-bottom: 1.5rem;
  }

  .section-label {
    font-family: "Fraunces", Georgia, serif;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--coral);
    font-weight: 600;
    margin-bottom: 0.7rem;
    display: block;
  }

  .ingredients {
    list-style: none;
    display: grid;
    gap: 0.5rem;
  }

  .ingredients li {
    padding: 0.6rem 0.85rem;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid var(--line);
    font-size: 0.97rem;
    color: var(--ink);
    position: relative;
    padding-left: 2.1rem;
  }

  .ingredients li::before {
    content: "";
    position: absolute;
    left: 0.85rem;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--coral);
  }

  .instructions {
    font-size: 1rem;
    color: var(--ink);
    line-height: 1.65;
  }

  /* ---------- ACTIONS ---------- */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.7rem;
    margin-top: 1.75rem;
  }

  .btn {
    padding: 0.9rem 0.8rem;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s, background 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lift);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn-like {
    background: var(--sage);
    color: white;
  }
  .btn-like:hover { background: var(--sage-dark); }

  .btn-skip {
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-skip:hover { background: var(--bg-warm); }

  .btn-dislike {
    background: var(--rose);
    color: white;
  }
  .btn-dislike:hover { background: var(--rose-dark); }

  /* ---------- LISTS ---------- */
  .lists {
    margin-top: 3rem;
  }

  .tabs {
    display: flex;
    gap: 0.5rem;
    border-bottom: 1px solid var(--line);
    margin-bottom: 1rem;
  }

  .tab {
    background: transparent;
    border: none;
    padding: 0.75rem 1rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--ink-soft);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
  }

  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--coral);
  }

  .tab-count {
    background: var(--bg-warm);
    padding: 0.1rem 0.5rem;
    border-radius: 999px;
    font-size: 0.75rem;
    margin-left: 0.3rem;
  }

  .list-panel {
    display: none;
  }
  .list-panel.active {
    display: block;
  }

  .rated-list {
    list-style: none;
    display: grid;
    gap: 0.5rem;
  }

  .rated-list li {
    padding: 0.7rem 1rem;
    background: var(--card);
    border-radius: 10px;
    border: 1px solid var(--line);
    cursor: pointer;
    font-size: 0.95rem;
    transition: background 0.15s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .rated-list li:hover {
    background: var(--bg-warm);
    transform: translateX(3px);
  }

  .rated-list li .cal-text {
    color: var(--ink-faint);
    font-size: 0.82rem;
  }

  .empty-state {
    color: var(--ink-faint);
    font-style: italic;
    text-align: center;
    padding: 2rem 1rem;
  }

  /* ---------- FOOTER ---------- */
  footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 0.8rem;
    color: var(--ink-faint);
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 540px) {
    .wrap { padding: 1.5rem 1rem 3rem; }
    .card { padding: 1.5rem 1.25rem; }
    .actions { grid-template-columns: 1fr; }
    .btn { padding: 0.85rem; }
  }
</style>
</head>

</div>

// ============================================================
//  STATE — persisted in localStorage
// ============================================================
const STORAGE_KEY = "summerBites.ratings";
let ratings = loadRatings();
let currentRecipe = null;

function loadRatings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

function saveRatings() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(ratings));
  } catch (e) {
    // localStorage unavailable — app still works for this session
  }
}

// ============================================================
//  RECIPE SELECTION
// ============================================================
function pickNextRecipe() {
  // Prefer unrated recipes; fall back to all if everything is rated
  const unrated = RECIPES.filter(r => !(r.id in ratings));
  const pool = unrated.length > 0 ? unrated : RECIPES;

  // Avoid showing the same recipe twice in a row if possible
  let choice;
  let attempts = 0;
  do {
    choice = pool[Math.floor(Math.random() * pool.length)];
    attempts++;
  } while (currentRecipe && choice.id === currentRecipe.id && pool.length > 1 && attempts < 10);

  currentRecipe = choice;
  renderRecipe(choice);
}

function showSpecificRecipe(id) {
  const recipe = RECIPES.find(r => r.id === id);
  if (recipe) {
    currentRecipe = recipe;
    renderRecipe(recipe);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

// ============================================================
//  RENDERING
// ============================================================
function renderRecipe(r) {
  const card = document.getElementById("recipeCard");
  const ratingStatus = ratings[r.id];
  const statusLabel =
    ratingStatus === "liked" ? `<span class="badge" style="background:#e7f0e2;color:#3f5d33;">♥ You liked this</span>` :
    ratingStatus === "disliked" ? `<span class="badge" style="background:#f5e1e1;color:#8a3f3f;">✕ You passed on this</span>` : "";

  card.innerHTML = `
    <h2 class="recipe-name">${r.name}</h2>
    <div class="badges">
      <span class="badge cal">🔥 ${r.calories} cal</span>
      <span class="badge ing">🧺 ${r.ingredients.length} ingredient${r.ingredients.length === 1 ? "" : "s"}</span>
      ${statusLabel}
    </div>

    <div class="section">
      <span class="section-label">Shopping List</span>
      <ul class="ingredients">
        ${r.ingredients.map(i => `<li>${i}</li>`).join("")}
      </ul>
    </div>

    <div class="section">
      <span class="section-label">How to Make It</span>
      <p class="instructions">${r.instructions}</p>
    </div>
  `;
}

function renderLists() {
  const likedIds = Object.keys(ratings).filter(id => ratings[id] === "liked").map(Number);
  const dislikedIds = Object.keys(ratings).filter(id => ratings[id] === "disliked").map(Number);

  const likedList = document.getElementById("likedList");
  const dislikedList = document.getElementById("dislikedList");

  likedList.innerHTML = likedIds.length === 0
    ? `<div class="empty-state">No favorites yet — tap 👍 Yum to save meals you love.</div>`
    : likedIds.map(id => {
        const r = RECIPES.find(x => x.id === id);
        return `<li data-id="${r.id}"><span>${r.name}</span><span class="cal-text">${r.calories} cal</span></li>`;
      }).join("");

  dislikedList.innerHTML = dislikedIds.length === 0
    ? `<div class="empty-state">Nothing here yet — tap 👎 to skip meals that aren't for you.</div>`
    : dislikedIds.map(id => {
        const r = RECIPES.find(x => x.id === id);
        return `<li data-id="${r.id}"><span>${r.name}</span><span class="cal-text">${r.calories} cal</span></li>`;
      }).join("");

  // wire up click-to-view
  document.querySelectorAll(".rated-list li").forEach(li => {
    li.addEventListener("click", () => showSpecificRecipe(Number(li.dataset.id)));
  });

  document.getElementById("likedCount").textContent = likedIds.length;
  document.getElementById("dislikedCount").textContent = dislikedIds.length;

  const rated = Object.keys(ratings).length;
  document.getElementById("progress").textContent = `${rated} of 50 tried`;
}

// ============================================================
//  EVENT HANDLERS
// ============================================================
function rateCurrent(rating) {
  if (!currentRecipe) return;
  ratings[currentRecipe.id] = rating;
  saveRatings();
  renderLists();
  pickNextRecipe();
}

document.getElementById("likeBtn").addEventListener("click", () => rateCurrent("liked"));
document.getElementById("dislikeBtn").addEventListener("click", () => rateCurrent("disliked"));
document.getElementById("skipBtn").addEventListener("click", () => pickNextRecipe());

document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Clear all your ratings and start fresh?")) {
    ratings = {};
    saveRatings();
    renderLists();
    pickNextRecipe();
  }
});

// Tab switching
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".list-panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.tab + "Panel").classList.add("active");
  });
});

// Keyboard shortcuts: ← dislike, → like, space skip
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === "ArrowRight") { e.preventDefault(); rateCurrent("liked"); }
  else if (e.key === "ArrowLeft") { e.preventDefault(); rateCurrent("disliked"); }
  else if (e.key === " ") { e.preventDefault(); pickNextRecipe(); }
});

// ============================================================
//  INITIAL RENDER
// ============================================================
pickNextRecipe();
renderLists();
</script>
