<style>
  :root {
    --bg: #fdf6e8;
    --bg-warm: #f7ecd4;
    --card: #ffffff;
    --ink: #2c2117;
    --ink-soft: #6b5c4e;
    --ink-faint: #a89a89;
    --line: #ecdfc6;
    --coral: #e07856;
    --coral-dark: #c25e3e;
    --sage: #6b8e5f;
    --sage-dark: #557548;
    --rose: #c17070;
    --rose-dark: #a55656;
    --sun: #f4c753;
    --ocean: #4a90c4;
    --ocean-dark: #3270a0;
    --gold: #e8a020;
    --gold-dark: #c47e10;
    --shadow: 0 6px 24px rgba(78,52,22,.10), 0 2px 6px rgba(78,52,22,.06);
    --shadow-lift: 0 12px 32px rgba(78,52,22,.15), 0 4px 10px rgba(78,52,22,.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Poppins", system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }

  body {
    background-image:
      radial-gradient(circle at 10% 0%, rgba(244,199,83,.15) 0%, transparent 50%),
      radial-gradient(circle at 90% 20%, rgba(224,120,86,.10) 0%, transparent 50%),
      radial-gradient(circle at 50% 100%, rgba(107,142,95,.08) 0%, transparent 50%);
    background-attachment: fixed;
  }

  .wrap { max-width: 760px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }

  /* HEADER */
  header { text-align: center; margin-bottom: 1.75rem; }

  .sun-icon { font-size: 2.2rem; display: inline-block; animation: spin 18s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  h1 {
    font-family: "Pacifico", Georgia, serif;
    font-weight: 400;
    font-size: clamp(2.2rem, 7vw, 3.6rem);
    line-height: 1.1;
    margin: 0.5rem 0 0.6rem;
  }
  h1 em { font-style: normal; color: var(--coral); }

  .tagline { font-size: 1rem; color: var(--ink-soft); max-width: 420px; margin: 0 auto; }

  .meta-bar {
    display: flex; justify-content: center; align-items: center;
    gap: 0.75rem; margin-top: 1.1rem; flex-wrap: wrap;
    font-size: 0.88rem; color: var(--ink-soft);
  }

  .progress-pill, .datetime-pill {
    background: var(--bg-warm);
    padding: 0.35rem 0.85rem;
    border-radius: 999px;
    border: 1px solid var(--line);
    font-weight: 600;
    color: var(--ink);
  }

  .datetime-pill { font-weight: 500; color: var(--ink-soft); font-size: 0.82rem; }

  .reset-btn {
    background: transparent; border: none; color: var(--ink-faint);
    cursor: pointer; font-family: inherit; font-size: 0.82rem;
    text-decoration: underline; transition: color .2s;
  }
  .reset-btn:hover { color: var(--rose-dark); }

  /* FILTERS */
  .filters {
    display: flex; justify-content: center; gap: 0.6rem;
    margin-bottom: 1.4rem; flex-wrap: wrap;
  }

  .filter-btn {
    padding: 0.55rem 1.25rem;
    border: 2px solid var(--line);
    border-radius: 999px;
    font-family: inherit; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; background: var(--card); color: var(--ink-soft);
    transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--coral); color: var(--coral); }
  .filter-btn.active { background: var(--coral); border-color: var(--coral); color: white; }
  .filter-btn.veg.active { background: var(--sage); border-color: var(--sage); }
  .filter-btn.meat.active { background: var(--coral-dark); border-color: var(--coral-dark); }

  /* CARD */
  .card {
    background: var(--card); border-radius: 18px; padding: 2rem;
    box-shadow: var(--shadow); border: 1px solid var(--line);
    position: relative; overflow: hidden; animation: fadeIn .4s ease-out;
  }
  .card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(90deg, var(--sun) 0%, var(--coral) 50%, var(--sage) 100%);
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .recipe-name {
    font-family: "Pacifico", Georgia, serif;
    font-weight: 400;
    font-size: clamp(1.5rem, 4.5vw, 2.1rem);
    line-height: 1.25; margin-bottom: 0.75rem;
  }

  .badges { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .badge {
    background: var(--bg-warm); color: var(--ink);
    padding: 0.3rem 0.8rem; border-radius: 999px;
    font-size: 0.82rem; font-weight: 600;
    display: inline-flex; align-items: center; gap: 0.3rem;
  }
  .badge.cal { background: #fdf0d8; color: #8a6520; }
  .badge.ing { background: #e7f0e2; color: #3f5d33; }

  .section { margin-bottom: 1.5rem; }
  .section-label {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: .18em;
    color: var(--coral); font-weight: 700; margin-bottom: 0.65rem; display: block;
  }

  .ingredients { list-style: none; display: grid; gap: 0.45rem; }
  .ingredients li {
    padding: 0.55rem 0.85rem 0.55rem 2rem;
    background: var(--bg); border-radius: 10px;
    border: 1px solid var(--line); font-size: 0.96rem; position: relative;

  .ingredients li::before {
    content: ""; position: absolute; left: 0.8rem; top: 50%;
    transform: translateY(-50%); width: 8px; height: 8px;
    border-radius: 50%; background: var(--coral);
  }
  .instructions { font-size: 0.98rem; color: var(--ink); line-height: 1.68; }

  /* ACTIONS */
  .actions {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 0.65rem; margin-top: 1.5rem;
  }

  .btn {
    padding: 1.1rem 0.6rem; border: none; border-radius: 14px;
    font-family: inherit; font-weight: 700; cursor: pointer;
    transition: transform .15s ease, box-shadow .2s, background .2s;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 0.3rem;
  }
  .btn-icon { font-size: 1.6rem; line-height: 1; }
  .btn-label { font-size: 0.72rem; font-weight: 600; opacity: .9; white-space: nowrap; }

  .btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); }
  .btn:active { transform: translateY(0); }

  .btn-dislike { background: var(--rose); color: white; }
  .btn-dislike:hover { background: var(--rose-dark); }

  .btn-skip { background: var(--ocean); color: white; }
  .btn-skip:hover { background: var(--ocean-dark); }

  .btn-like { background: var(--sage); color: white; }
  .btn-like:hover { background: var(--sage-dark); }

  .btn-favorite { background: var(--gold); color: white; }
  .btn-favorite:hover { background: var(--gold-dark); }
  .btn-favorite.is-favorited { background: var(--gold-dark); box-shadow: 0 0 0 3px rgba(232,160,32,.35); }

  /* LISTS */
  .lists { margin-top: 3rem; }
  .tabs {
    display: flex; gap: 0.4rem; border-bottom: 1px solid var(--line);
    margin-bottom: 1rem; flex-wrap: wrap;
  }
  .tab {
    background: transparent; border: none; padding: 0.7rem 0.9rem; cursor: pointer;
    font-family: inherit; font-size: 0.92rem; font-weight: 600; color: var(--ink-soft);
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .2s, border-color .2s;

  .tab.active { color: var(--ink); border-bottom-color: var(--coral); }
  .tab-count {
    background: var(--bg-warm); padding: .1rem .45rem;
    border-radius: 999px; font-size: .73rem; margin-left: .25rem;
  }
  .list-panel { display: none; }
  .list-panel.active { display: block; }

  .rated-list { list-style: none; display: grid; gap: 0.45rem; }
  .rated-list li {
    padding: 0.65rem 1rem; background: var(--card);
    border-radius: 10px; border: 1px solid var(--line);
    cursor: pointer; font-size: 0.93rem;
    transition: background .15s, transform .15s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .rated-list li:hover { background: var(--bg-warm); transform: translateX(3px); }
  .rated-list li .cal-text { color: var(--ink-faint); font-size: 0.8rem; }

  .empty-state { color: var(--ink-faint); font-style: italic; text-align: center; padding: 2rem 1rem; }

  footer { text-align: center; margin-top: 3rem; font-size: 0.8rem; color: var(--ink-faint); }

  @media (max-width: 540px) {
    .wrap { padding: 1.5rem 1rem 3rem; }
    .card { padding: 1.5rem 1.1rem; }
    .actions { grid-template-columns: 1fr 1fr; gap: 0.55rem; }
    .btn { padding: 1rem 0.6rem; }
  }
</style>
</head>

</div>

const TOTAL = RECIPES.length;
const STORAGE_KEY = "summerBites.v2";
let state = loadState();
let currentRecipe = null;
let activeFilter = "all";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { ratings: {}, favorites: {} };
  } catch (e) {
    return { ratings: {}, favorites: {} };
  }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const date = now.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" });
  const time = now.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
  document.getElementById("datetimePill").textContent = `${date} · ${time}`;
}
updateClock();
setInterval(updateClock, 1000);

// ── RECIPE SELECTION ──
function filteredPool() {
  if (activeFilter === "veg") return RECIPES.filter(r => r.veg);
  if (activeFilter === "meat") return RECIPES.filter(r => !r.veg);
  return RECIPES;
}

function pickNextRecipe() {
  const pool = filteredPool();
  if (!pool.length) return;
  const unrated = pool.filter(r => !(r.id in state.ratings));
  const source = unrated.length > 0 ? unrated : pool;
  let choice, attempts = 0;
  do {
    choice = source[Math.floor(Math.random() * source.length)];
    attempts++;
  } while (currentRecipe && choice.id === currentRecipe.id && source.length > 1 && attempts < 10);
  currentRecipe = choice;
  renderRecipe(choice);
  updateFavoriteBtn();
}

function showSpecificRecipe(id) {
  const recipe = RECIPES.find(r => r.id === id);
  if (recipe) { currentRecipe = recipe; renderRecipe(recipe); updateFavoriteBtn(); window.scrollTo({ top:0, behavior:"smooth" }); }
}

// ── RENDER ──
function renderRecipe(r) {
  const ratingStatus = state.ratings[r.id];
  const statusBadge =
    ratingStatus === "liked" ? `<span class="badge" style="background:#e7f0e2;color:#3f5d33;">♥ Liked</span>` :
    ratingStatus === "disliked" ? `<span class="badge" style="background:#f5e1e1;color:#8a3f3f;">✕ Passed</span>` : "";
  const favBadge = state.favorites[r.id]
    ? `<span class="badge" style="background:#fef3d0;color:#8a6010;">⭐ Favorited</span>` : "";
  const vegBadge = r.veg
    ? `<span class="badge" style="background:#e7f0e2;color:#3f5d33;">🥗 Vegetarian</span>` : "";

  document.getElementById("recipeCard").innerHTML = `
    <h2 class="recipe-name">${r.name}</h2>
    <div class="badges">
      <span class="badge cal">🔥 ${r.calories} cal</span>
      <span class="badge ing">🧺 ${r.ingredients.length} ingredient${r.ingredients.length === 1 ? "" : "s"}</span>
      ${vegBadge}${statusBadge}${favBadge}
    </div>
    <div class="section">
      <span class="section-label">Shopping List</span>
      <ul class="ingredients">${r.ingredients.map(i => `<li>${i}</li>`).join("")}</ul>
    </div>
    <div class="section">
      <span class="section-label">How to Make It</span>
      <p class="instructions">${r.instructions}</p>
    </div>`;
}

function updateFavoriteBtn() {
  const btn = document.getElementById("favoriteBtn");
  if (!currentRecipe) return;
  if (state.favorites[currentRecipe.id]) {
    btn.classList.add("is-favorited");
    btn.querySelector(".btn-label").textContent = "Favorited!";
  } else {
    btn.classList.remove("is-favorited");
    btn.querySelector(".btn-label").textContent = "Favorite";
  }
}

function renderLists() {
  const likedIds = Object.keys(state.ratings).filter(id => state.ratings[id] === "liked").map(Number);
  const dislikedIds = Object.keys(state.ratings).filter(id => state.ratings[id] === "disliked").map(Number);
  const favIds = Object.keys(state.favorites).filter(id => state.favorites[id]).map(Number);

  function makeItem(id) {
    const r = RECIPES.find(x => x.id === id);
    if (!r) return "";
    return `<li data-id="${r.id}"><span>${r.name}</span><span class="cal-text">${r.calories} cal</span></li>`;
  }

  document.getElementById("likedList").innerHTML = likedIds.length
    ? likedIds.map(makeItem).join("")
    : `<div class="empty-state">No favorites yet — tap 👍 Yum to save meals you love.</div>`;

  document.getElementById("dislikedList").innerHTML = dislikedIds.length
    ? dislikedIds.map(makeItem).join("")
    : `<div class="empty-state">Nothing here yet — tap 👎 to skip meals that aren't for you.</div>`;

  document.getElementById("favoritesList").innerHTML = favIds.length
    ? favIds.map(makeItem).join("")
    : `<div class="empty-state">Nothing starred yet — tap ⭐ Favorite to save the best ones.</div>`;

  document.querySelectorAll(".rated-list li").forEach(li => {
    li.addEventListener("click", () => showSpecificRecipe(Number(li.dataset.id)));
  });

  document.getElementById("likedCount").textContent = likedIds.length;
  document.getElementById("dislikedCount").textContent = dislikedIds.length;
  document.getElementById("favoritesCount").textContent = favIds.length;

  const rated = Object.keys(state.ratings).length;
  document.getElementById("progress").textContent = `${rated} of ${TOTAL} tried`;
}

// ── ACTIONS ──
function rateCurrent(rating) {
  if (!currentRecipe) return;
  state.ratings[currentRecipe.id] = rating;
  saveState();
  renderLists();
  pickNextRecipe();
}

function toggleFavorite() {
  if (!currentRecipe) return;
  state.favorites[currentRecipe.id] = !state.favorites[currentRecipe.id];
  if (!state.favorites[currentRecipe.id]) delete state.favorites[currentRecipe.id];
  saveState();
  renderLists();
  updateFavoriteBtn();
  renderRecipe(currentRecipe);
}

// ── EVENT LISTENERS ──
document.getElementById("likeBtn").addEventListener("click", () => rateCurrent("liked"));
document.getElementById("dislikeBtn").addEventListener("click", () => rateCurrent("disliked"));
document.getElementById("skipBtn").addEventListener("click", () => pickNextRecipe());
document.getElementById("favoriteBtn").addEventListener("click", toggleFavorite);

document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Clear all ratings and favorites and start fresh?")) {
    state = { ratings: {}, favorites: {} };
    saveState();
    renderLists();
    pickNextRecipe();
  }
});

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".list-panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.tab + "Panel").classList.add("active");
  });
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    pickNextRecipe();
  });
});

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === "ArrowRight") { e.preventDefault(); rateCurrent("liked"); }
  else if (e.key === "ArrowLeft") { e.preventDefault(); rateCurrent("disliked"); }
  else if (e.key === " ") { e.preventDefault(); pickNextRecipe(); }
  else if (e.key === "f" || e.key === "F") { toggleFavorite(); }
});

// ── INIT ──
pickNextRecipe();
renderLists();
</script>
